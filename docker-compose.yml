services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: whatsapp-bot:latest
    container_name: whatsapp-bot

    # Load secrets from your shell environment.
    # Before running: export $(grep -v '^#' .env | xargs)
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - KAPSO_API_KEY=${KAPSO_API_KEY:-}
      - KAPSO_PHONE_NUMBER_ID=${KAPSO_PHONE_NUMBER_ID:-}
      - KAPSO_WEBHOOK_SECRET=${KAPSO_WEBHOOK_SECRET:-}
      - PORT=${PORT:-8080}

    ports:
      - "${PORT:-8080}:8080"

    # Restart automatically unless explicitly stopped
    restart: unless-stopped

    # Health-check: hit the root endpoint that returns {"status":"ok"}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource limits suitable for a small cloud VM (512 MB RAM, 0.5 CPU)
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
